<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>The Brewtique — Digital Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream: #FDF6EC;
            --warm-white: #FAF3E8;
            --gold: #C9973A;
            --gold-light: #E8B860;
            --gold-pale: #F5E4C0;
            --dark: #1A1208;
            --dark2: #2A1F0E;
            --brown: #5C3D1A;
            --brown-light: #8B6340;
            --text: #2A1F0E;
            --muted: #8B7355;
            --border: rgba(201,151,58,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--cream);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ── HERO ── */
        .hero {
            position: relative;
            background: var(--dark);
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 40px 20px 80px;
        }

        .hero-bg {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,151,58,0.18) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 20% 100%, rgba(139,99,64,0.12) 0%, transparent 60%);
        }

        .hero-lines {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(201,151,58,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,151,58,0.05) 1px, transparent 1px);
            background-size: 70px 70px;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            animation: drift 12s ease-in-out infinite;
        }
        .orb-1 { width: 320px; height: 320px; background: rgba(201,151,58,0.12); top: -80px; right: -60px; }
        .orb-2 { width: 200px; height: 200px; background: rgba(139,99,64,0.1); bottom: 60px; left: -40px; animation-delay: -5s; }

        @keyframes drift {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(12px,-18px) scale(1.04); }
        }

        .hero-content {
            position: relative; z-index: 10;
            text-align: center;
            animation: fadeUp 0.9s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-ring {
            width: 88px; height: 88px;
            border-radius: 50%;
            border: 1.5px solid rgba(201,151,58,0.45);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            position: relative;
        }
        .logo-ring::before {
            content: '';
            position: absolute; inset: 7px;
            border-radius: 50%;
            border: 1px solid rgba(201,151,58,0.22);
        }
        .logo-icon { font-size: 38px; line-height: 1; }

        .hero-eyebrow {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 12px;
        }

        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3.2rem, 14vw, 6rem);
            font-weight: 300;
            color: var(--cream);
            letter-spacing: -1px;
            line-height: 0.95;
        }
        .hero-title em {
            font-style: italic;
            color: var(--gold-light);
        }

        .hero-divider {
            display: flex; align-items: center; gap: 12px; justify-content: center;
            margin: 22px auto;
        }
        .hero-divider span { height: 1px; width: 60px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }

        .hero-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(1rem, 3vw, 1.25rem);
            color: rgba(253,246,236,0.45);
            font-weight: 300;
            margin-bottom: 30px;
        }

        .badges {
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
            margin-bottom: 34px;
        }
        .badge {
            padding: 5px 13px;
            border: 1px solid rgba(201,151,58,0.28);
            border-radius: 20px;
            font-size: 0.7rem;
            color: rgba(253,246,236,0.55);
        }

        .hero-cta {
            display: inline-flex; align-items: center; gap: 9px;
            padding: 14px 32px;
            background: var(--gold);
            color: var(--dark);
            border: none; border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 8px 30px rgba(201,151,58,0.35);
            transition: all 0.3s;
        }
        .hero-cta:hover { background: var(--gold-light); transform: translateY(-2px); }

        .hero-scroll {
            position: absolute; bottom: 28px; left: 50%;
            transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            color: rgba(253,246,236,0.25);
            font-size: 0.62rem; letter-spacing: 3px; text-transform: uppercase;
            animation: scrollBounce 2.5s ease-in-out infinite;
        }
        @keyframes scrollBounce {
            0%,100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(7px); }
        }

        /* ── STICKY BAR ── */
        .sticky-bar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(253,246,236,0.93);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 11px 16px;
        }

        .sticky-inner {
            max-width: 900px; margin: 0 auto;
            display: flex; flex-direction: column; gap: 10px;
        }

        .search-wrap { position: relative; }
        .search-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%); color: var(--muted);
            pointer-events: none;
        }
        .search-bar {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: white;
            border: 1.5px solid var(--border);
            border-radius: 50px;
            color: var(--text);
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-bar::placeholder { color: var(--muted); }
        .search-bar:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,151,58,0.12); }

        .cat-nav {
            display: flex; gap: 7px; overflow-x: auto;
            scrollbar-width: none;
        }
        .cat-nav::-webkit-scrollbar { display: none; }

        .cat-btn {
            padding: 6px 15px;
            background: transparent;
            border: 1.5px solid rgba(92,61,26,0.16);
            color: var(--brown-light);
            border-radius: 20px; cursor: pointer;
            white-space: nowrap;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem; font-weight: 500;
            transition: all 0.22s;
            flex-shrink: 0;
        }
        .cat-btn.active { background: var(--dark); color: var(--gold-light); border-color: var(--dark); }
        .cat-btn:hover:not(.active) { border-color: var(--gold); color: var(--brown); }

        /* ── MENU ── */
        #menu-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 28px 16px 80px;
        }

        .section-header {
            display: flex; align-items: center; gap: 14px;
            margin: 38px 0 18px;
            opacity: 0; transform: translateY(16px);
            transition: opacity 0.45s ease, transform 0.45s ease;
        }
        .section-header.visible { opacity: 1; transform: none; }
        .section-header:first-child { margin-top: 6px; }
        .section-line { flex: 1; height: 1px; background: var(--border); }
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.55rem; font-weight: 600;
            color: var(--brown); white-space: nowrap;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px;
        }

        .menu-card {
            background: white;
            border: 1px solid rgba(201,151,58,0.14);
            border-radius: 16px;
            overflow: hidden;
            display: flex; flex-direction: column;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            opacity: 0; transform: translateY(18px);
            animation: none;
        }
        .menu-card.visible {
            opacity: 1; transform: none;
            transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }
        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 38px rgba(201,151,58,0.16);
            border-color: rgba(201,151,58,0.38);
        }

        /* Thumbnail */
        .card-thumb {
            width: 100%; aspect-ratio: 16/9;
            position: relative; overflow: hidden; flex-shrink: 0;
        }
        .card-thumb-emoji {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.8rem; user-select: none;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.12));
        }
        .card-thumb-glow {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 65% 35%, rgba(255,255,255,0.45) 0%, transparent 65%);
        }
        .ar-badge {
            position: absolute; top: 10px; right: 10px;
            background: var(--dark); color: var(--gold);
            font-size: 0.58rem; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            padding: 4px 9px; border-radius: 20px;
        }

        .card-body {
            padding: 15px; display: flex;
            flex-direction: column; gap: 11px; flex: 1;
        }

        .item-name {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.22rem; font-weight: 600;
            color: var(--dark); line-height: 1.2;
        }

        .item-desc {
            font-size: 0.76rem; color: var(--muted);
            line-height: 1.5; margin-top: -4px;
        }

        /* Prices */
        .price-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 1px; background: var(--border);
            border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
        }
        .price-2col {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 1px; background: var(--border);
            border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
        }
        .price-col { background: var(--warm-white); padding: 8px 6px; text-align: center; }
        .p-label { display: block; font-size: 0.58rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
        .p-val { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 700; color: var(--gold); }
        .single-price { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; color: var(--gold); }

        .view-btn {
            width: 100%; padding: 11px;
            background: var(--dark); color: var(--gold-light);
            border: none; border-radius: 10px; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.76rem; font-weight: 600;
            letter-spacing: 0.8px; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.22s;
        }
        .view-btn:hover { background: var(--gold); color: var(--dark); }
        .view-btn:hover svg { transform: scale(1.2) rotate(8deg); }
        .view-btn svg { transition: transform 0.3s; }

        /* ── MODAL ── */
        #viewerModal {
            display: none; position: fixed; inset: 0;
            background: rgba(10,8,5,0.97); z-index: 1000;
        }
        #viewerModal.open { display: flex; flex-direction: column; }

        .modal-header {
            padding: 18px 18px 14px;
            display: flex; align-items: flex-start; justify-content: space-between;
            border-bottom: 1px solid rgba(201,151,58,0.14);
            flex-shrink: 0;
        }
        .modal-eyebrow {
            font-size: 0.62rem; letter-spacing: 3px;
            text-transform: uppercase; color: var(--gold);
            margin-bottom: 4px;
        }
        #modalTitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(1.3rem, 5vw, 1.9rem);
            color: var(--cream); font-weight: 300;
        }
        .close-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--cream); width: 38px; height: 38px;
            border-radius: 50%; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; flex-shrink: 0; margin-top: 4px;
        }
        .close-btn:hover { background: rgba(255,255,255,0.16); }

        #viewer-container { flex: 1; position: relative; min-height: 0; }

        model-viewer {
            width: 100%; height: 100%;
            outline: none; background-color: transparent;
        }

        #loading-overlay {
            position: absolute; inset: 0;
            display: none; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px;
            pointer-events: none;
        }
        #loading-overlay.visible { display: flex; }

        .loading-ring {
            width: 52px; height: 52px;
            border: 2px solid rgba(201,151,58,0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold); font-size: 1rem; letter-spacing: 1px;
        }

        .ar-btn {
            background: var(--gold); color: var(--dark);
            padding: 13px 28px; border-radius: 50px; border: none;
            font-weight: 700; text-transform: uppercase;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem; letter-spacing: 1px; cursor: pointer;
            box-shadow: 0 4px 20px rgba(201,151,58,0.4);
            transition: all 0.22s;
        }
        .ar-btn:hover { background: var(--gold-light); }

        .modal-footer {
            padding: 14px 18px;
            border-top: 1px solid rgba(201,151,58,0.14);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .modal-price-badge {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem; font-weight: 700; color: var(--gold);
        }
        .modal-hint {
            font-size: 0.7rem; color: rgba(253,246,236,0.3);
            display: flex; align-items: center; gap: 5px;
        }

        /* ── EMPTY ── */
        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--muted);
        }
        .empty-state .e-icon { font-size: 3rem; margin-bottom: 14px; }
        .empty-state h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; margin-bottom: 8px; color: var(--brown); }

        /* ── FOOTER ── */
        footer {
            background: var(--dark); color: rgba(253,246,236,0.35);
            text-align: center; padding: 28px 20px;
            font-size: 0.73rem; letter-spacing: 1px;
        }
        footer span { color: var(--gold); }

        /* ── RESPONSIVE ── */
        @media (max-width: 460px) {
            .menu-grid { grid-template-columns: 1fr; }
            .hero-cta { width: 100%; max-width: 280px; justify-content: center; }
        }
        @media (min-width: 580px) {
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
            .sticky-inner { flex-direction: row; align-items: center; }
            .search-wrap { flex: 1; }
        }
        @media (min-width: 880px) {
            .menu-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<!-- HERO -->
<section class="hero" id="top">
    <div class="hero-bg"></div>
    <div class="hero-lines"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="hero-content">
        <div class="logo-ring">
            <span class="logo-icon">☕</span>
        </div>
        <p class="hero-eyebrow">Welcome to</p>
        <h1 class="hero-title">The Brew<em>tique</em></h1>
        <div class="hero-divider">
            <span></span>
            <span style="color:var(--gold);font-size:0.5rem;">◆</span>
            <span></span>
        </div>
        <p class="hero-tagline">Immersive dining · Real-time 3D menu</p>
        <div class="badges">
            <span class="badge">📍 Kalyan, Maharashtra</span>
            <span class="badge">🕐 Open Daily</span>
            <span class="badge">✨ 3D & AR Viewing</span>
        </div>
        <a href="#menu" class="hero-cta">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 5l7 7-7 7"/></svg>
            Explore Menu
        </a>
    </div>

    <div class="hero-scroll">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        Scroll
    </div>
</section>

<!-- STICKY SEARCH + FILTER -->
<div class="sticky-bar" id="menu">
    <div class="sticky-inner">
        <div class="search-wrap">
            <span class="search-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            </span>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search dishes…" oninput="renderMenu()">
        </div>
        <div class="cat-nav" id="cat-nav">
            <button class="cat-btn active" onclick="setFilter('All')">All</button>
            <button class="cat-btn" onclick="setFilter('Fried Rice')">🍚 Fried Rice</button>
            <button class="cat-btn" onclick="setFilter('Noodles')">🍜 Noodles</button>
            <button class="cat-btn" onclick="setFilter('Gravy')">🥘 Gravy</button>
            <button class="cat-btn" onclick="setFilter('Sizzlers')">🔥 Sizzlers</button>
            <button class="cat-btn" onclick="setFilter('Momos')">🥟 Momos</button>
            <button class="cat-btn" onclick="setFilter('Add Ons')">➕ Add Ons</button>
        </div>
    </div>
</div>

<!-- MENU -->
<div id="menu-container"></div>

<!-- 3D MODAL -->
<div id="viewerModal">
    <div class="modal-header">
        <div>
            <p class="modal-eyebrow">3D View &amp; AR</p>
            <h2 id="modalTitle">Dish Name</h2>
        </div>
        <button class="close-btn" onclick="close3D()">✕</button>
    </div>
    <div id="viewer-container">
        <div id="loading-overlay">
            <div class="loading-ring"></div>
            <p class="loading-text">Loading model…</p>
        </div>
    </div>
    <div class="modal-footer">
        <div class="modal-price-badge" id="modalPrice"></div>
        <div class="modal-hint">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
            Drag to rotate · Pinch to zoom
        </div>
    </div>
</div>

<footer>
    <p>© 2026 <span>The Brewtique</span> · Kalyan · All prices in ₹ · Inclusive of taxes</p>
</footer>

<script>
    const models = {
        rice1:     "./3d/fried_rice_-_revopoint_inspire.glb",
        rice2:     "./3d/singapore_chicken_rice.glb",
        noodles1:  "./3d/cold_noodles_scaniverse.glb",
        noodles2:  "./3d/spaghetti_dish_3d_scanned.glb",
        gravy1:    "./3d/scan_2023-04-30t055008.216z.glb",
        gravy2:    "./3d/soy_sauce.glb",
        sizzler:   "./3d/barbecue_-_sketchfab_weekly_-_07_may_23.glb",
        momoSteam: "./3d/steamed__momos.glb",
        momoFry:   "./3d/fry_momo.glb",
        momoMix:   "./3d/momo_food.glb",
        egg:       "./3d/egg.glb",
        prawn:     "./3d/tandoori_prawn.glb",
        chicken:   "./3d/chicken_duck.glb"
    };

    const catMeta = {
        "Fried Rice": { icon: "🍚", bg: "linear-gradient(135deg,#F5E4C0,#EDD9A0)" },
        "Noodles":    { icon: "🍜", bg: "linear-gradient(135deg,#FADAC2,#F5C8A8)" },
        "Gravy":      { icon: "🥘", bg: "linear-gradient(135deg,#F5DCDC,#EFC8C8)" },
        "Sizzlers":   { icon: "🔥", bg: "linear-gradient(135deg,#FCE8D5,#F5D0B0)" },
        "Momos":      { icon: "🥟", bg: "linear-gradient(135deg,#E8F0DC,#D8EAC0)" },
        "Add Ons":    { icon: "✨", bg: "linear-gradient(135deg,#E0EAF5,#C8D8EE)" },
    };

    const dishDesc = {
        "Veg Fried Rice":"Wok-tossed basmati with garden vegetables",
        "Egg Fried Rice":"Classic fried rice folded with fresh eggs",
        "Schezwan Veg Fried Rice":"Fiery Schezwan sauce with crisp vegetables",
        "Triple Veg Fried Rice (gravy)":"Three-veg medley with a rich savoury gravy",
        "Paneer Fried Rice":"Cottage cheese cubes in aromatic fried rice",
        "Singapore Rice":"Southeast Asian-inspired with tangy seasonings",
        "Mushroom Rice":"Earthy mushrooms with seasoned basmati",
        "Manchurian Rice":"Indo-Chinese classic with Manchurian balls",
        "Burnt Garlic Fried Rice":"Toasted garlic with a smoky wok finish",
        "Burnt Chilly Fried Rice":"Charred chillies, bold heat, wok fragrance",

    let currentFilter = 'All';

    function setFilter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.cat-btn').forEach(b => {
            const label = b.textContent.replace(/[^\w\s]/gu,'').trim();
            b.classList.toggle('active', label === cat || (cat === 'All' && b.textContent.trim() === 'All'));
        });
        renderMenu();
    }

    function buildPrice(prices) {
        const keys = Object.keys(prices);
        if (keys.length === 1) return `<div class="single-price">₹${prices[keys[0]]}</div>`;
        const cls = keys.length === 2 ? 'price-2col' : 'price-grid';
        return `<div class="${cls}">${keys.map(k=>`<div class="price-col"><span class="p-label">${k}</span><span class="p-val">₹${prices[k]}</span></div>`).join('')}</div>`;
    }

    function renderMenu() {
        const container = document.getElementById('menu-container');
        container.innerHTML = '';
        const search = document.getElementById('searchInput').value.toLowerCase().trim();
        const cats = [...new Set(menuData.map(i => i.cat))];
        let total = 0;

        cats.forEach(cat => {
            if (currentFilter !== 'All' && currentFilter !== cat) return;
            const items = menuData.filter(i => i.cat === cat && i.name.toLowerCase().includes(search));
            if (!items.length) return;
            total += items.length;

            const meta = catMeta[cat] || { icon:'🍽️', bg:'#F5E4C0' };

            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerHTML = `<div class="section-line"></div><span style="font-size:1.2rem">${meta.icon}</span><h2 class="section-title">${cat}</h2><div class="section-line"></div>`;
            container.appendChild(header);

            const grid = document.createElement('div');
            grid.className = 'menu-grid';

            items.forEach(item => {
                const desc = dishDesc[item.name] || 'A Brewtique specialty';
                const card = document.createElement('div');
                card.className = 'menu-card';

                // Safely encode for onclick
                const safeModel = item.model.replace(/'/g, "\\'");
                const pricesJSON = JSON.stringify(item.prices).replace(/"/g, '&quot;');

                card.innerHTML = `
                    <div class="card-thumb" style="background:${meta.bg}">
                        <div class="card-thumb-emoji">${meta.icon}</div>
                        <div class="card-thumb-glow"></div>
                        <span class="ar-badge">3D · AR</span>
                    </div>
                    <div class="card-body">
                        <h3 class="item-name">${item.name}</h3>
                        <p class="item-desc">${desc}</p>
                        ${buildPrice(item.prices)}
                        <button class="view-btn" onclick='open3D(${JSON.stringify(item.name)}, "${safeModel}", ${JSON.stringify(item.prices)})'>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                            View in 3D / AR
                        </button>
                    </div>`;
                grid.appendChild(card);
            });

            container.appendChild(grid);
        });

        if (total === 0) {
            container.innerHTML = `<div class="empty-state"><div class="e-icon">🔍</div><h3>Nothing found</h3><p>Try a different search or browse all.</p></div>`;
        }

        // Intersection observer for scroll-in
        const io = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
        }, { threshold: 0.08 });

        document.querySelectorAll('.section-header, .menu-card').forEach((el, i) => {
            el.style.transitionDelay = (i * 0.035) + 's';
            io.observe(el);
        });
    }

    // ── MODAL ──
    const modal = document.getElementById('viewerModal');
    const modalTitleEl = document.getElementById('modalTitle');
    const modalPriceEl = document.getElementById('modalPrice');
    const viewerContainer = document.getElementById('viewer-container');
    const loadingOverlay = document.getElementById('loading-overlay');

    window.open3D = function(name, modelSrc, prices) {
        modalTitleEl.textContent = name;
        const vals = Object.values(prices);
        modalPriceEl.textContent = vals.length === 1
            ? `₹${vals[0]}`
            : `From ₹${Math.min(...vals)}`;

        modal.classList.add('open');
        document.body.style.overflow = 'hidden';

        // Clear old viewer
        const old = viewerContainer.querySelector('model-viewer');
        if (old) old.remove();
        loadingOverlay.classList.add('visible');
        loadingOverlay.querySelector('.loading-text').textContent = 'Loading model…';

        const mv = document.createElement('model-viewer');
        mv.setAttribute('src', modelSrc);
        mv.setAttribute('auto-rotate', '');
        mv.setAttribute('camera-controls', '');
        mv.setAttribute('ar', '');
        mv.setAttribute('ar-modes', 'webxr scene-viewer quick-look');
        mv.setAttribute('ar-scale', 'auto');
        mv.setAttribute('bounds', 'tight');
        mv.setAttribute('shadow-intensity', '1.2');
        mv.setAttribute('exposure', '1');
        mv.style.cssText = 'width:100%;height:100%;outline:none;background:transparent;';

        const arBtn = document.createElement('button');
        arBtn.setAttribute('slot', 'ar-button');
        arBtn.className = 'ar-btn';
        arBtn.textContent = '📱 View on Your Table (AR)';
        mv.appendChild(arBtn);

        mv.addEventListener('load', () => loadingOverlay.classList.remove('visible'));
        mv.addEventListener('error', () => {
            loadingOverlay.querySelector('.loading-text').textContent = '⚠ Model unavailable';
        });

        viewerContainer.insertBefore(mv, loadingOverlay);
    };

    window.close3D = function() {
        modal.classList.remove('open');
        document.body.style.overflow = '';
        const mv = viewerContainer.querySelector('model-viewer');
        if (mv) mv.remove();
        loadingOverlay.classList.remove('visible');
    };

    document.addEventListener('keydown', e => { if (e.key === 'Escape') close3D(); });

    renderMenu();
</script>
